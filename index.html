<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星邻 - 首页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; background: #f5f7fa; }
        .story-ring { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 2.5px; border-radius: 50%; }
        .story-ring-viewed { background: #d1d5db; padding: 2.5px; border-radius: 50%; }
        .post-card { transition: all 0.2s ease; }
        .post-card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
        .like-btn.liked { color: #ef4444; }
        .tab-active { color: #1f2937; border-bottom: 2px solid #667eea; }
        .tab-inactive { color: #9ca3af; }
    </style>
</head>
<body class="min-h-screen">
    <!-- 顶部导航 -->
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
            <h1 class="text-xl font-bold text-gray-800">星邻</h1>
            <div class="flex items-center gap-4">
                <button class="w-9 h-9 rounded-full bg-gray-50 flex items-center justify-center text-gray-600 hover:bg-gray-100 transition">
                    <i class="fas fa-search"></i>
                </button>
                <button class="w-9 h-9 rounded-full bg-gray-50 flex items-center justify-center text-gray-600 hover:bg-gray-100 transition relative">
                    <i class="fas fa-bell"></i>
                    <span class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-red-500 rounded-full text-white text-xs flex items-center justify-center">3</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto pb-20">
        <!-- 故事栏 -->
        <section class="bg-white mt-3 rounded-2xl mx-2 p-4 shadow-sm">
            <div class="flex gap-4 overflow-x-auto pb-2 scrollbar-hide">
                <div class="flex-shrink-0 text-center">
                    <div class="relative w-16 h-16 mx-auto">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=myself" class="w-full h-full rounded-full object-cover">
                        <div class="absolute bottom-0 right-0 w-5 h-5 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs border-2 border-white">
                            <i class="fas fa-plus"></i>
                        </div>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">我的故事</p>
                </div>
                <div class="flex-shrink-0 text-center">
                    <div class="story-ring w-16 h-16 mx-auto">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=alice" class="w-full h-full rounded-full object-cover border-2 border-white">
                    </div>
                    <p class="text-xs text-gray-600 mt-1">小雨</p>
                </div>
                <div class="flex-shrink-0 text-center">
                    <div class="story-ring w-16 h-16 mx-auto">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=bob" class="w-full h-full rounded-full object-cover border-2 border-white">
                    </div>
                    <p class="text-xs text-gray-600 mt-1">阿杰</p>
                </div>
                <div class="flex-shrink-0 text-center">
                    <div class="story-ring-viewed w-16 h-16 mx-auto">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=carol" class="w-full h-full rounded-full object-cover border-2 border-white">
                    </div>
                    <p class="text-xs text-gray-500 mt-1">晓雯</p>
                </div>
                <div class="flex-shrink-0 text-center">
                    <div class="story-ring-viewed w-16 h-16 mx-auto">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=david" class="w-full h-full rounded-full object-cover border-2 border-white">
                    </div>
                    <p class="text-xs text-gray-500 mt-1">大雄</p>
                </div>
            </div>
        </section>

        <!-- 发布框 -->
        <section class="bg-white mt-3 rounded-2xl mx-2 p-4 shadow-sm">
            <div class="flex items-center gap-3">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=myself" class="w-10 h-10 rounded-full">
                <div class="flex-1 bg-gray-50 rounded-full px-4 py-2.5 text-gray-400 text-sm cursor-pointer hover:bg-gray-100 transition">
                    分享你的新鲜事...
                </div>
            </div>
            <div class="flex justify-around mt-4 pt-3 border-t border-gray-50">
                <button class="flex items-center gap-2 text-gray-500 hover:text-blue-500 transition text-sm">
                    <i class="fas fa-image text-green-500"></i> 图片
                </button>
                <button class="flex items-center gap-2 text-gray-500 hover:text-blue-500 transition text-sm">
                    <i class="fas fa-video text-red-500"></i> 视频
                </button>
                <button class="flex items-center gap-2 text-gray-500 hover:text-blue-500 transition text-sm">
                    <i class="fas fa-map-marker-alt text-orange-500"></i> 位置
                </button>
            </div>
        </section>

        <!-- 动态列表 -->
        <div id="feed-list" class="mt-3 space-y-3 mx-2">
            <!-- 动态1 -->
            <article class="post-card bg-white rounded-2xl p-4 shadow-sm">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=alice" class="w-11 h-11 rounded-full">
                        <div>
                            <h3 class="font-semibold text-gray-800">林小雨</h3>
                            <p class="text-xs text-gray-400">2小时前 · 上海</p>
                        </div>
                    </div>
                    <button class="text-gray-400 hover:text-gray-600"><i class="fas fa-ellipsis-h"></i></button>
                </div>
                <p class="mt-3 text-gray-700 leading-relaxed">周末去看了樱花，真的太美了！春天的气息扑面而来，忍不住拍了好多照片。大家周末都去哪儿玩了？</p>
                <div class="grid grid-cols-3 gap-1.5 mt-3 rounded-xl overflow-hidden">
                    <img src="https://picsum.photos/seed/sakura1/300/300" class="w-full aspect-square object-cover">
                    <img src="https://picsum.photos/seed/sakura2/300/300" class="w-full aspect-square object-cover">
                    <img src="https://picsum.photos/seed/sakura3/300/300" class="w-full aspect-square object-cover">
                </div>
                <div class="flex items-center justify-between mt-4 pt-3 border-t border-gray-50">
                    <button class="like-btn flex items-center gap-1.5 text-gray-500 hover:text-red-500 transition" onclick="toggleLike(this)">
                        <i class="far fa-heart"></i> <span class="text-sm">128</span>
                    </button>
                    <button class="flex items-center gap-1.5 text-gray-500 hover:text-blue-500 transition">
                        <i class="far fa-comment"></i> <span class="text-sm">32</span>
                    </button>
                    <button class="flex items-center gap-1.5 text-gray-500 hover:text-green-500 transition">
                        <i class="far fa-share-square"></i> <span class="text-sm">8</span>
                    </button>
                </div>
            </article>

            <!-- 动态2 -->
            <article class="post-card bg-white rounded-2xl p-4 shadow-sm">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=bob" class="w-11 h-11 rounded-full">
                        <div>
                            <h3 class="font-semibold text-gray-800">陈阿杰</h3>
                            <p class="text-xs text-gray-400">4小时前</p>
                        </div>
                    </div>
                    <button class="text-gray-400 hover:text-gray-600"><i class="fas fa-ellipsis-h"></i></button>
                </div>
                <p class="mt-3 text-gray-700 leading-relaxed">终于完成了这个月的健身目标！坚持就是胜利，感觉整个人都充满了能量。</p>
                <div class="mt-3 rounded-xl overflow-hidden">
                    <img src="https://picsum.photos/seed/gym/600/340" class="w-full aspect-video object-cover">
                </div>
                <div class="flex items-center justify-between mt-4 pt-3 border-t border-gray-50">
                    <button class="like-btn flex items-center gap-1.5 text-gray-500 hover:text-red-500 transition" onclick="toggleLike(this)">
                        <i class="far fa-heart"></i> <span class="text-sm">256</span>
                    </button>
                    <button class="flex items-center gap-1.5 text-gray-500 hover:text-blue-500 transition">
                        <i class="far fa-comment"></i> <span class="text-sm">45</span>
                    </button>
                    <button class="flex items-center gap-1.5 text-gray-500 hover:text-green-500 transition">
                        <i class="far fa-share-square"></i> <span class="text-sm">12</span>
                    </button>
                </div>
            </article>

            <!-- 动态3 -->
            <article class="post-card bg-white rounded-2xl p-4 shadow-sm">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=carol" class="w-11 h-11 rounded-full">
                        <div>
                            <h3 class="font-semibold text-gray-800">王晓雯</h3>
                            <p class="text-xs text-gray-400">昨天 · 北京</p>
                        </div>
                    </div>
                    <button class="text-gray-400 hover:text-gray-600"><i class="fas fa-ellipsis-h"></i></button>
                </div>
                <p class="mt-3 text-gray-700 leading-relaxed">分享一首最近单曲循环的歌，旋律太治愈了，推荐给所有人！</p>
                <div class="mt-3 bg-gray-50 rounded-xl p-3 flex items-center gap-3">
                    <div class="w-12 h-12 bg-gradient-to-br from-purple-400 to-pink-400 rounded-lg flex items-center justify-center text-white">
                        <i class="fas fa-music"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-medium text-gray-800 text-sm">夜空中最亮的星</p>
                        <p class="text-xs text-gray-500">逃跑计划</p>
                    </div>
                    <button class="w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center text-gray-600">
                        <i class="fas fa-play text-xs"></i>
                    </button>
                </div>
                <div class="flex items-center justify-between mt-4 pt-3 border-t border-gray-50">
                    <button class="like-btn flex items-center gap-1.5 text-gray-500 hover:text-red-500 transition" onclick="toggleLike(this)">
                        <i class="far fa-heart"></i> <span class="text-sm">89</span>
                    </button>
                    <button class="flex items-center gap-1.5 text-gray-500 hover:text-blue-500 transition">
                        <i class="far fa-comment"></i> <span class="text-sm">18</span>
                    </button>
                    <button class="flex items-center gap-1.5 text-gray-500 hover:text-green-500 transition">
                        <i class="far fa-share-square"></i> <span class="text-sm">5</span>
                    </button>
                </div>
            </article>
        </div>

        <!-- 加载更多 -->
        <div class="text-center py-6">
            <p class="text-gray-400 text-sm">没有更多动态了</p>
        </div>
    </main>

    <!-- 底部导航 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-gray-100 z-50">
        <div class="max-w-2xl mx-auto flex justify-around items-center py-2">
            <a href="index.html" class="flex flex-col items-center gap-0.5 text-blue-600">
                <i class="fas fa-compass text-xl"></i>
                <span class="text-xs">首页</span>
            </a>
            <a href="discover.html" class="flex flex-col items-center gap-0.5 text-gray-400 hover:text-gray-600">
                <i class="fas fa-compass text-xl"></i>
                <span class="text-xs">发现</span>
            </a>
            <a href="chat.html" class="flex flex-col items-center gap-0.5 text-gray-400 hover:text-gray-600">
                <i class="fas fa-comment-dots text-xl"></i>
                <span class="text-xs">消息</span>
            </a>
            <a href="contacts.html" class="flex flex-col items-center gap-0.5 text-gray-400 hover:text-gray-600">
                <i class="fas fa-address-book text-xl"></i>
                <span class="text-xs">通讯录</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center gap-0.5 text-gray-400 hover:text-gray-600">
                <i class="fas fa-user text-xl"></i>
                <span class="text-xs">我的</span>
            </a>
        </div>
    </nav>

    <script>
        function toggleLike(btn) {
            btn.classList.toggle('liked');
            const icon = btn.querySelector('i');
            const count = btn.querySelector('span');
            if (btn.classList.contains('liked')) {
                icon.classList.remove('far');
                icon.classList.add('fas');
                count.textContent = parseInt(count.textContent) + 1;
            } else {
                icon.classList.remove('fas');
                icon.classList.add('far');
                count.textContent = parseInt(count.textContent) - 1;
            }
        }
    </script>
</body>
</html>
