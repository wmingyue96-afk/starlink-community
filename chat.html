<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星邻 - 消息</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; background: #f5f7fa; }
        .chat-item { transition: all 0.2s; }
        .chat-item:hover { background: #f8fafc; }
        .chat-item:active { transform: scale(0.98); }
        .unread-badge { min-width: 18px; height: 18px; }
    </style>
</head>
<body class="min-h-screen">
    <!-- 顶部 -->
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
            <h1 class="text-lg font-semibold text-gray-800">消息</h1>
            <button class="w-9 h-9 rounded-full bg-gray-50 flex items-center justify-center text-gray-600 hover:bg-gray-100 transition">
                <i class="fas fa-edit"></i>
            </button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto pb-20">
        <!-- 搜索 -->
        <div class="px-4 py-3">
            <div class="bg-white rounded-xl px-4 py-2.5 flex items-center gap-3 shadow-sm">
                <i class="fas fa-search text-gray-400"></i>
                <input type="text" placeholder="搜索聊天" class="flex-1 bg-transparent outline-none text-sm text-gray-700 placeholder-gray-400">
            </div>
        </div>

        <!-- 聊天列表 -->
        <div class="mx-2 bg-white rounded-2xl shadow-sm overflow-hidden">
            <!-- 聊天1 -->
            <a href="#" class="chat-item flex items-center gap-3 px-4 py-3.5 border-b border-gray-50">
                <div class="relative">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=alice" class="w-12 h-12 rounded-xl">
                    <span class="absolute -top-1 -right-1 unread-badge bg-red-500 rounded-full text-white text-xs flex items-center justify-center px-1">3</span>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between">
                        <h3 class="font-semibold text-gray-800">林小雨</h3>
                        <span class="text-xs text-gray-400">10:30</span>
                    </div>
                    <p class="text-sm text-gray-500 truncate mt-0.5">周末一起去喝咖啡吗？</p>
                </div>
            </a>

            <!-- 聊天2 -->
            <a href="#" class="chat-item flex items-center gap-3 px-4 py-3.5 border-b border-gray-50">
                <div class="relative">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=bob" class="w-12 h-12 rounded-xl">
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between">
                        <h3 class="font-semibold text-gray-800">陈阿杰</h3>
                        <span class="text-xs text-gray-400">昨天</span>
                    </div>
                    <p class="text-sm text-gray-500 truncate mt-0.5">健身房见！</p>
                </div>
            </a>

            <!-- 聊天3 -->
            <a href="#" class="chat-item flex items-center gap-3 px-4 py-3.5 border-b border-gray-50">
                <div class="relative">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=carol" class="w-12 h-12 rounded-xl">
                    <span class="absolute -top-1 -right-1 unread-badge bg-red-500 rounded-full text-white text-xs flex items-center justify-center px-1">1</span>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between">
                        <h3 class="font-semibold text-gray-800">王晓雯</h3>
                        <span class="text-xs text-gray-400">昨天</span>
                    </div>
                    <p class="text-sm text-gray-500 truncate mt-0.5">[图片] 你看这张照片怎么样</p>
                </div>
            </a>

            <!-- 聊天4 -->
            <a href="#" class="chat-item flex items-center gap-3 px-4 py-3.5 border-b border-gray-50">
                <div class="relative">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=david" class="w-12 h-12 rounded-xl">
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between">
                        <h3 class="font-semibold text-gray-800">李大雄</h3>
                        <span class="text-xs text-gray-400">周一</span>
                    </div>
                    <p class="text-sm text-gray-500 truncate mt-0.5">项目进度怎么样了？</p>
                </div>
            </a>

            <!-- 聊天5 -->
            <a href="#" class="chat-item flex items-center gap-3 px-4 py-3.5 border-b border-gray-50">
                <div class="relative">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=eve" class="w-12 h-12 rounded-xl">
                    <span class="absolute -top-1 -right-1 unread-badge bg-red-500 rounded-full text-white text-xs flex items-center justify-center px-1">5</span>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between">
                        <h3 class="font-semibold text-gray-800">设计群</h3>
                        <span class="text-xs text-gray-400">09:15</span>
                    </div>
                    <p class="text-sm text-gray-500 truncate mt-0.5">小明：新的方案已经上传了</p>
                </div>
            </a>

            <!-- 聊天6 -->
            <a href="#" class="chat-item flex items-center gap-3 px-4 py-3.5">
                <div class="relative">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=frank" class="w-12 h-12 rounded-xl">
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between">
                        <h3 class="font-semibold text-gray-800">张伟</h3>
                        <span class="text-xs text-gray-400">上周</span>
                    </div>
                    <p class="text-sm text-gray-500 truncate mt-0.5">收到，谢谢！</p>
                </div>
            </a>
        </div>
    </main>

    <!-- 底部导航 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-gray-100 z-50">
        <div class="max-w-2xl mx-auto flex justify-around items-center py-2">
            <a href="index.html" class="flex flex-col items-center gap-0.5 text-gray-400 hover:text-gray-600">
                <i class="fas fa-compass text-xl"></i>
                <span class="text-xs">首页</span>
            </a>
            <a href="discover.html" class="flex flex-col items-center gap-0.5 text-gray-400 hover:text-gray-600">
                <i class="fas fa-compass text-xl"></i>
                <span class="text-xs">发现</span>
            </a>
            <a href="chat.html" class="flex flex-col items-center gap-0.5 text-blue-600">
                <i class="fas fa-comment-dots text-xl"></i>
                <span class="text-xs">消息</span>
            </a>
            <a href="contacts.html" class="flex flex-col items-center gap-0.5 text-gray-400 hover:text-gray-600">
                <i class="fas fa-address-book text-xl"></i>
                <span class="text-xs">通讯录</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center gap-0.5 text-gray-400 hover:text-gray-600">
                <i class="fas fa-user text-xl"></i>
                <span class="text-xs">我的</span>
            </a>
        </div>
    </nav>
</body>
</html>
